# Voice Assistant - ESP32-S3 (Poprawiona konfiguracja 2026-02-27)
# Używa bezpiecznych pinów (nie kolidujących z PSRAM)

esphome:
  name: voice-assistant
  friendly_name: voice-assistant
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.arduino.memory_type: qio_opi

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: y
      CONFIG_AUDIO_BOARD_CUSTOM: y


# PSRAM - obowiązkowe dla Wake Word!
psram:
  mode: octal
  speed: 80MHz

# Logi
logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

# Home Assistant API
api:
  encryption:
    key: !secret otap_code  # Ustaw w secrets.yaml

ota:
  - platform: esphome
    password: !secret ota_password

# WiFi
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Voice-Assistant Fallback Hotspot"
    password: !secret fallback_password

captive_portal:

# ============================================
# STAN ASYSTENTA (dla wyświetlacza)
# 0 = Idle, 1 = Listening, 2 = Thinking, 3 = Speaking
# ============================================
globals:
  - id: va_state
    type: int
    restore_value: no
    initial_value: '0'

# ============================================
# KONFIGURACJA I2S AUDIO
# ============================================
i2s_audio:
  # Mikrofon (INMP441) - piny bezpieczne, nie kolidujące z PSRAM
  - id: i2s_in
    i2s_lrclk_pin: GPIO3
    i2s_bclk_pin: GPIO2

  # Głośnik (MAX98357A) - piny niskie
  - id: i2s_out
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO8

microphone:
  - platform: i2s_audio
    id: board_microphone
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO1
    adc_type: external
    pdm: false
    channel: left
    bits_per_sample: 32bit
    sample_rate: 16000

speaker:
  - platform: i2s_audio
    id: board_speaker
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO18
    dac_type: external
    channel: mono
    bits_per_sample: 16bit
    buffer_duration: 500ms
    timeout: 500ms

# ============================================
# TEST BUTTONS (opcjonalnie)
# ============================================
rtttl:
  speaker: board_speaker
  id: my_rtttl
  gain: 0.8
button:
  - platform: template
    name: "Test RTTTL (Dźwięk)"
    on_press:
      - rtttl.play: "TwoBeeps:d=4,o=5,b=100:16e6,16e6"

  - platform: template
    name: "Wymuś Nasłuch (Debug)"
    on_press:
      - voice_assistant.start:

# ============================================
# WAKE WORD & VOICE ASSISTANT
# ============================================
micro_wake_word:
  id: wake_word_engine
  models:
    - model: /config/esphome/models/okay_nabu.json
  on_wake_word_detected:
    - logger.log: "Wake Word detected! Starting Assistant..."
    - globals.set:
        id: va_state
        value: '1'
    - voice_assistant.start:

voice_assistant:
  id: va
  microphone: board_microphone
  speaker: board_speaker
  noise_suppression_level: 2.0
  auto_gain: 31dBFS
  volume_multiplier: 4.0
  micro_wake_word: wake_word_engine
  use_wake_word: true

  on_listening:
    - logger.log: "🎤 Mikrofon aktywny - Czekam na mowę..."
    - globals.set:
        id: va_state
        value: '1'
    - component.update: my_display

  on_stt_end:
    - logger.log: "✅ Koniec rozpoznawania mowy (STT)"
    - globals.set:
        id: va_state
        value: '2'
    - component.update: my_display

  on_tts_start:
    - globals.set:
        id: va_state
        value: '3'
    - component.update: my_display

  on_end:
    - delay: 1s
    - wait_until:
        not:
          speaker.is_playing:
    - globals.set:
        id: va_state
        value: '0'
    - component.update: my_display
    - micro_wake_word.start:

  on_error:
    - logger.log: "Voice Assistant Error!"
    - globals.set:
        id: va_state
        value: '0'
    - delay: 1s
    - micro_wake_word.start:

# ============================================
# WYŚWIETLACZ (GC9A01A - 240x240)
# ============================================
spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11
  interface: hardware

output:
  - platform: ledc
    pin: GPIO14
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: display_backlight
    restore_mode: ALWAYS_ON

font:
  - file: "Roboto-Bold.ttf"
    id: font_main
    size: 20

display:
  - platform: ili9xxx
    model: GC9A01A
    id: my_display
    cs_pin: GPIO10
    dc_pin: GPIO9
    reset_pin: GPIO13
    invert_colors: true
    rotation: 0
    update_interval: 100ms

    lambda: |-
      int state = id(va_state);
      long now = millis();

      int cx = 120;
      int cy = 100;
      int eye_dist = 50;
      int eye_r = 25;
      Color col = Color(255, 255, 255);

      it.fill(Color(0, 0, 0));

      if (state == 1) {
        col = Color(0, 255, 0);
        eye_r = 35;
        it.filled_circle(cx - eye_dist, cy, eye_r, col);
        it.filled_circle(cx + eye_dist, cy, eye_r, col);
        it.print(cx, 180, id(font_main), col, TextAlign::CENTER, "Słucham...");
      }
      else if (state == 2) {
        col = Color(255, 255, 0);
        int offset = (int)(sin(now / 100.0) * 10);
        it.filled_circle(cx - eye_dist, cy + offset, eye_r, col);
        it.filled_circle(cx + eye_dist, cy - offset, eye_r, col);
        it.print(cx, 180, id(font_main), col, TextAlign::CENTER, "Myślę...");
      }
      else if (state == 3) {
        col = Color(50, 150, 255);
        it.filled_circle(cx - eye_dist, cy, eye_r, col);
        it.filled_circle(cx + eye_dist, cy, eye_r, col);
        it.filled_circle(cx - eye_dist, cy, 10, Color(0, 0, 0));
        it.filled_circle(cx + eye_dist, cy, 10, Color(0, 0, 0));
        int mouth_h = 5 + abs((int)(sin(now / 80.0) * 20));
        it.filled_rectangle(cx - 30, 160 - (mouth_h/2), 60, mouth_h, Color(255, 255, 255));
      }
      else {
        col = Color(255, 255, 255);
        bool blink = (now % 4000 < 150);
        if (blink) {
          it.line(cx - eye_dist - 20, cy, cx - eye_dist + 20, cy, col);
          it.line(cx + eye_dist - 20, cy, cx + eye_dist + 20, cy, col);
        } else {
          it.filled_circle(cx - eye_dist, cy, eye_r, col);
          it.filled_circle(cx + eye_dist, cy, eye_r, col);
          it.filled_circle(cx - eye_dist, cy + 5, 8, Color(0, 0, 0));
          it.filled_circle(cx + eye_dist, cy + 5, 8, Color(0, 0, 0));
        }
      }
